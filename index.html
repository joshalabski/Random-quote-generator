<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"  crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Random Quote Generator</h1>

    <button id="generate-btn">
      <i class="fas fa-sync-alt"></i>
      Generate Quote!
    </button>

    <div class="quote-container" id="contaiquotes">
      <!--QUOTE BOX-->
     <h2 class="quote-text" id="quote">"Be yourself; everyone else is already taken." </h2>

   
     <p class="quote-author" id="quote-auth">~Oscar Wilde</p>

       <div class="icon-container" id="icon-contains">
       <i class="far fa-heart heart-btn "></i>
      <i class="far fa-copy copy-btn"></i>
     </div>
    
    </div>

  </div>



  <script src="script.js"></script>
</body>
</html>
